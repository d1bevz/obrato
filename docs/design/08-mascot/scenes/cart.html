<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Amigo · 04 Закупки — тележка</title>
<style>
:root{--ink:#1b1813;--helmet:#f7b500;--helmet-d:#d49400;--green:#1f9d57;--green-d:#14723d;--surface:#fffdf8;--paper:#f3efe6;--amber:#d98324}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.title{color:#6b6456;font-size:13px;letter-spacing:.04em;margin-bottom:10px;text-transform:uppercase}
.scene{position:relative;width:380px;height:420px;background:var(--surface);border:1px solid #ddd6c8;border-radius:18px;display:flex;align-items:center;justify-content:center}
.scene svg{width:336px;height:auto;display:block;overflow:visible}
.ln{fill:none;stroke:var(--ink);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.ln-thin{fill:none;stroke:var(--ink);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}
.fill-ink{fill:var(--ink);stroke:none}
.mustache{fill:var(--ink);stroke:none}
  .mcurl{fill:none;stroke:var(--ink);stroke-width:10;stroke-linecap:round;stroke-linejoin:round}
  .hl{fill:var(--surface)}
.helmet{fill:var(--helmet);stroke:var(--ink);stroke-width:5;stroke-linejoin:round}
.helmet-sh{fill:var(--helmet-d);stroke:none}
.paper-fill{fill:var(--surface)}

/* ===== prop styling ===== */
.cart{fill:none;stroke:var(--ink);stroke-width:4.6;stroke-linecap:round;stroke-linejoin:round}
.cart-wire{fill:none;stroke:var(--ink);stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.cart-pane{fill:var(--paper);stroke:none;opacity:.55}
.bar{fill:var(--surface);stroke:var(--ink);stroke-width:6.4;stroke-linecap:round}
.seat{fill:var(--paper);stroke:var(--ink);stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round}
.fork{fill:none;stroke:var(--ink);stroke-width:4.2;stroke-linecap:round;stroke-linejoin:round}
.wheel{fill:var(--surface);stroke:var(--ink);stroke-width:4.4}
.wheel-hub{fill:var(--ink);stroke:none}
.box{fill:var(--surface);stroke:var(--ink);stroke-width:4.2;stroke-linecap:round;stroke-linejoin:round}
.box-line{fill:none;stroke:var(--ink);stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round}
.box-label{fill:var(--paper);stroke:var(--ink);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.box-accent{fill:none;stroke:var(--green);stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.arm{fill:none;stroke:var(--ink);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.hand-fill{fill:var(--surface);stroke:var(--ink);stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round}
.ground{fill:none;stroke:var(--ink);stroke-width:2.4;stroke-linecap:round;opacity:.35}

/* ===== STATIC by default — every motion gated behind .play (no .play = calm) ===== */

/* whole rig (Amigo + cart) leans forward & rolls with a gentle bob */
.play .rig{ animation: roll 2.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
@keyframes roll{
  0%   { transform: translateX(0) translateY(0) rotate(0deg); }
  25%  { transform: translateX(2px) translateY(-2.5px) rotate(-.4deg); }
  50%  { transform: translateX(0) translateY(0) rotate(0deg); }
  75%  { transform: translateX(2px) translateY(-2.5px) rotate(.4deg); }
  100% { transform: translateX(0) translateY(0) rotate(0deg); }
}

/* wheels spin while rolling */
.play .wheelSpin{ animation: spin 1.05s linear infinite; }
@keyframes spin{ from{ transform: rotate(0deg);} to{ transform: rotate(360deg);} }

/* the tile box jostles a little inside the basket as it rolls */
.play .cargo{ animation: jostle 2.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
@keyframes jostle{
  0%   { transform: translateY(0) rotate(0deg); }
  25%  { transform: translateY(-3px) rotate(-1.4deg); }
  50%  { transform: translateY(0) rotate(0deg); }
  75%  { transform: translateY(-3px) rotate(1.4deg); }
  100% { transform: translateY(0) rotate(0deg); }
}

/* occasional blink */
.play .eyeL,.play .eyeR{ animation: blink 5.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
@keyframes blink{ 0%,92%,100%{ transform: scaleY(1);} 95.5%{ transform: scaleY(.08);} }

@media (prefers-reduced-motion: reduce){ .play *{animation:none!important} }
</style>
