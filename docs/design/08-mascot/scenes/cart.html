<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Amigo · 04 Закупки — тележка</title>
<style>
:root{--ink:#1b1813;--helmet:#f7b500;--helmet-d:#d49400;--green:#1f9d57;--green-d:#14723d;--surface:#fffdf8;--paper:#f3efe6;--amber:#d98324}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.title{color:#6b6456;font-size:13px;letter-spacing:.04em;margin-bottom:10px;text-transform:uppercase}
.scene{position:relative;width:380px;height:420px;background:var(--surface);border:1px solid #ddd6c8;border-radius:18px;display:flex;align-items:center;justify-content:center}
.scene svg{width:336px;height:auto;display:block;overflow:visible}
.ln{fill:none;stroke:var(--ink);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.ln-thin{fill:none;stroke:var(--ink);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}
.fill-ink{fill:var(--ink);stroke:none}
.mustache{fill:var(--ink);stroke:none}
.helmet{fill:var(--helmet);stroke:var(--ink);stroke-width:5;stroke-linejoin:round}
.helmet-sh{fill:var(--helmet-d);stroke:none}
.paper-fill{fill:var(--surface)}

/* ===== prop styling ===== */
.cart{fill:none;stroke:var(--ink);stroke-width:4.6;stroke-linecap:round;stroke-linejoin:round}
.cart-wire{fill:none;stroke:var(--ink);stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.cart-pane{fill:var(--paper);stroke:none;opacity:.55}
.bar{fill:var(--surface);stroke:var(--ink);stroke-width:6.4;stroke-linecap:round}
.seat{fill:var(--paper);stroke:var(--ink);stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round}
.fork{fill:none;stroke:var(--ink);stroke-width:4.2;stroke-linecap:round;stroke-linejoin:round}
.wheel{fill:var(--surface);stroke:var(--ink);stroke-width:4.4}
.wheel-hub{fill:var(--ink);stroke:none}
.box{fill:var(--surface);stroke:var(--ink);stroke-width:4.2;stroke-linecap:round;stroke-linejoin:round}
.box-line{fill:none;stroke:var(--ink);stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round}
.box-label{fill:var(--paper);stroke:var(--ink);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.box-accent{fill:none;stroke:var(--green);stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.arm{fill:none;stroke:var(--ink);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.hand-fill{fill:var(--surface);stroke:var(--ink);stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round}
.ground{fill:none;stroke:var(--ink);stroke-width:2.4;stroke-linecap:round;opacity:.35}

/* ===== STATIC by default — every motion gated behind .play (no .play = calm) ===== */

/* whole rig (Amigo + cart) leans forward & rolls with a gentle bob */
.play .rig{ animation: roll 2.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
@keyframes roll{
  0%   { transform: translateX(0) translateY(0) rotate(0deg); }
  25%  { transform: translateX(2px) translateY(-2.5px) rotate(-.4deg); }
  50%  { transform: translateX(0) translateY(0) rotate(0deg); }
  75%  { transform: translateX(2px) translateY(-2.5px) rotate(.4deg); }
  100% { transform: translateX(0) translateY(0) rotate(0deg); }
}

/* wheels spin while rolling */
.play .wheelSpin{ animation: spin 1.05s linear infinite; }
@keyframes spin{ from{ transform: rotate(0deg);} to{ transform: rotate(360deg);} }

/* the tile box jostles a little inside the basket as it rolls */
.play .cargo{ animation: jostle 2.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center bottom; }
@keyframes jostle{
  0%   { transform: translateY(0) rotate(0deg); }
  25%  { transform: translateY(-3px) rotate(-1.4deg); }
  50%  { transform: translateY(0) rotate(0deg); }
  75%  { transform: translateY(-3px) rotate(1.4deg); }
  100% { transform: translateY(0) rotate(0deg); }
}

/* occasional blink */
.play .eyeL,.play .eyeR{ animation: blink 5.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
@keyframes blink{ 0%,92%,100%{ transform: scaleY(1);} 95.5%{ transform: scaleY(.08);} }

@media (prefers-reduced-motion: reduce){ .play *{animation:none!important} }
</style>
</head>
<body>
<div class="title">04 · Закупки — тележка</div>
<div class="scene play">
  <svg viewBox="14 34 360 312" role="img" aria-label="Amigo обеими руками толкает магазинную тележку с коробкой плитки">

    <!-- everything that travels lives in .rig so it rolls/leans as one unit -->
    <g class="rig">

      <!-- ground contact shadow line under the wheels -->
      <path class="ground" d="M70 320 q150 8 280 0"/>

      <!-- ===================== AMIGO BUST (verbatim geometry) =====================
           Scaled to 0.82 and nudged down-left, with a slight forward (clockwise) lean
           so he reads as PUSHING. Inner paths untouched. -->
      <g transform="translate(8,40) scale(.82) rotate(4 115 240)">
        <g class="amigo">
          <!-- shoulders -->
          <path class="ln paper-fill" d="M56 260 q0 -54 59 -54 q59 0 59 54"/>
          <path class="ln-thin" d="M95 214 q20 14 40 0"/>
          <path class="ln-thin" d="M115 222 q0 19 0 38"/>
          <!-- head -->
          <g class="head">
            <path class="ln paper-fill" d="M68 139 q-10 1 -9 12 q1 9 10 7"/>
            <path class="ln paper-fill" d="M162 139 q10 1 9 12 q-1 9 -10 7"/>
            <path class="ln paper-fill" d="M71 121 C 66 138 67 155 76 166 C 86 177 102 181 115 181 C 128 181 144 177 154 166 C 163 155 164 138 159 121 C 131 113 99 113 71 121 Z"/>
            <path class="helmet" d="M60 106 q1 -54 55 -54 q54 0 55 54 q-27 -10 -55 -10 q-28 0 -55 10 Z"/>
            <path class="helmet-sh" d="M60 106 q27 -10 55 -10 q28 0 55 10 q-3 7 -11 6 q-44 -9 -88 0 q-8 1 -11 -6 Z"/>
            <path class="ln" d="M115 53 q0 26 0 43" opacity=".5"/>
            <path class="ln" d="M50 106 q65 -19 130 0"/>
            
            
            <ellipse class="eyeL fill-ink" cx="92" cy="130" rx="4.4" ry="5.4"/>
            <ellipse class="eyeR fill-ink" cx="138" cy="130" rx="4.4" ry="5.4"/>
            <path class="ln-thin" d="M115 134 q3 9 0 16 q-3 3 -7 2"/>
            <g class="stache">
              <path class="mustache" d="M115 151 C 108 153 100 154 93 154 C 88 154 84 152 84 148 C 83 144 86 140 90 142 C 93 143 93 147 91 150 C 90 156 95 161 102 162 C 108 163 112 162 115 160 Z"/>
              <path class="mustache" d="M115 151 C 122 153 130 154 137 154 C 142 154 146 152 146 148 C 147 144 144 140 140 142 C 137 143 137 147 139 150 C 140 156 135 161 128 162 C 122 163 118 162 115 160 Z"/>
            </g>
            <path class="ln-thin mouth" d="M106 176 q9 4 18 0"/>
          </g>
        </g>
      </g>

      <!-- shoulder/scale reference for arms: with the bust transform above,
           the right shoulder lands near (150,225); the bar he pushes is at x≈196..236, y≈206. -->

      <!-- ===================== SHOPPING CART =====================
           Real supermarket trolley, FULLY in frame to the right of the body:
           - horizontal HANDLE bar at the back-top (both fists wrap it)
           - trapezoidal WIRE basket (wider open top, narrower base), see-through grid
           - fold-down child-seat flap hinged off the handle side
           - bottom frame + two visible swivel-fork wheels -->

      <!-- pale pane behind the wires so the basket reads as one volume but stays see-through -->
      <path class="cart-pane" d="M236 214 L342 214 L326 286 L258 286 Z"/>

      <!-- frame tubes: from the handle bar down to the basket corners -->
      <path class="cart" d="M236 206 q24 0 30 16 l3 14"/>
      <path class="cart" d="M212 214 q1 11 1 22"/>

      <!-- basket: trapezoid rim, wider at the open top -->
      <path class="cart" d="M236 214 L342 214"/>   <!-- top rim (open mouth) -->
      <path class="cart" d="M236 214 L258 286"/>   <!-- rear wall edge -->
      <path class="cart" d="M342 214 L326 286"/>   <!-- front wall edge -->
      <path class="cart" d="M258 286 L326 286"/>   <!-- bottom of basket -->

      <!-- WIRE GRID — verticals splay outward following the slanted walls -->
      <path class="cart-wire" d="M257 214 l-3 72"/>
      <path class="cart-wire" d="M278 214 l-1 72"/>
      <path class="cart-wire" d="M299 214 l0 72"/>
      <path class="cart-wire" d="M320 214 l1 72"/>
      <!-- WIRE GRID — horizontals, narrowing toward the base -->
      <path class="cart-wire" d="M241 238 l96 0"/>
      <path class="cart-wire" d="M247 262 l84 0"/>

      <!-- fold-down child-seat flap, hinged near the handle, tilted into the basket mouth -->
      <path class="seat" d="M240 216 l28 -8 l4 13 l-28 8 Z"/>
      <path class="cart-wire" d="M245 215 l27 -8 M249 227 l26 -8"/>

      <!-- bottom frame rail + two swivel-fork wheels -->
      <path class="cart" d="M254 288 l76 0"/>
      <!-- front swivel fork + wheel -->
      <g>
        <path class="fork" d="M268 288 l-2 8 q-1 4 4 5"/>
        <path class="fork" d="M264 296 l8 0"/>
        <g class="wheelSpin" style="transform-origin:268px 306px">
          <circle class="wheel" cx="268" cy="306" r="11"/>
          <circle class="wheel-hub" cx="268" cy="306" r="3"/>
          <path class="ln-thin" d="M268 297 l0 18 M259 306 l18 0"/>
        </g>
      </g>
      <!-- rear swivel fork + wheel -->
      <g>
        <path class="fork" d="M320 288 l2 8 q1 4 -4 5"/>
        <path class="fork" d="M316 296 l8 0"/>
        <g class="wheelSpin" style="transform-origin:320px 306px">
          <circle class="wheel" cx="320" cy="306" r="11"/>
          <circle class="wheel-hub" cx="320" cy="306" r="3"/>
          <path class="ln-thin" d="M320 297 l0 18 M311 306 l18 0"/>
        </g>
      </g>

      <!-- ===================== CARGO — box of tile with label, seated in the basket ===================== -->
      <g class="cargo" style="transform-origin:286px 226px">
        <rect class="box" x="262" y="186" width="50" height="40" rx="3"/>
        <!-- packing-tape cross -->
        <path class="box-line" d="M287 186 l0 40"/>
        <path class="box-line" d="M262 206 l50 0"/>
        <!-- product label panel + one modest green brand stripe -->
        <rect class="box-label" x="267" y="191" width="20" height="11" rx="1.5"/>
        <path class="box-accent" d="M270 196.5 l14 0"/>
      </g>

      <!-- ===================== HANDLE BAR + BOTH HANDS =====================
           Bar drawn first; then for EACH hand: palm mass behind, fingers curling
           OVER the bar, thumb — so each fist visibly WRAPS the bar. -->

      <!-- arms reaching from the shoulders out to the bar -->
      <path class="arm" d="M150 232 q26 -6 44 -22"/>
      <path class="arm" d="M158 244 q30 -4 56 -32"/>

      <!-- the horizontal grip bar both hands hold -->
      <path class="bar" d="M186 210 l52 0"/>
      <!-- bar end caps -->
      <path class="cart-wire" d="M186 203 l0 14 M238 203 l0 14"/>

      <!-- LEFT fist (near hand) wrapping the bar, centred at x≈197 -->
      <g class="hand">
        <!-- palm + back-of-hand mass cupping under the bar -->
        <path class="hand-fill" d="M186 213 q-9 1 -9 -8 q0 -9 9 -10 q11 -1 18 2 q5 3 4 9 q-2 7 -12 8 q-9 0 -18 -1 Z"/>
        <!-- three fingers curling OVER the front of the bar -->
        <path class="hand-fill" d="M189 203 q4 -5 9 -3 q4 2 3 9"/>
        <path class="hand-fill" d="M198 202 q4 -5 9 -3 q4 2 3 9"/>
        <path class="hand-fill" d="M207 203 q4 -5 9 -3 q3 2 2 9"/>
        <!-- thumb hooking the near underside -->
        <path class="hand-fill" d="M185 218 q-8 1 -9 -5 q-1 -6 7 -7"/>
        <!-- knuckle creases for grip read -->
        <path class="ln-thin" d="M200 206 q1 4 0 7" opacity=".55"/>
        <path class="ln-thin" d="M209 206 q1 4 0 7" opacity=".55"/>
      </g>

      <!-- RIGHT fist (far hand) wrapping the bar, centred at x≈226 -->
      <g class="hand">
        <path class="hand-fill" d="M215 213 q-9 1 -9 -8 q0 -9 9 -10 q11 -1 18 2 q5 3 4 9 q-2 7 -12 8 q-9 0 -18 -1 Z"/>
        <path class="hand-fill" d="M218 203 q4 -5 9 -3 q4 2 3 9"/>
        <path class="hand-fill" d="M227 202 q4 -5 9 -3 q4 2 3 9"/>
        <path class="hand-fill" d="M236 203 q4 -5 8 -3 q3 2 2 9"/>
        <path class="hand-fill" d="M214 218 q-8 1 -9 -5 q-1 -6 7 -7"/>
        <path class="ln-thin" d="M229 206 q1 4 0 7" opacity=".55"/>
        <path class="ln-thin" d="M238 206 q1 4 0 7" opacity=".55"/>
      </g>

    </g><!-- /.rig -->

  </svg>
</div>

<script>addEventListener("message",function(e){var s=document.querySelector(".scene");if(s)s.classList.toggle("play",e.data!=="calm");});</script>
</body>
</html>
