<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Amigo · 04 Закупки</title>
<style>
:root{--ink:#1b1813;--helmet:#f7b500;--helmet-d:#d49400;--green:#1f9d57;--green-d:#14723d;--surface:#fffdf8;--paper:#f3efe6;--amber:#d98324}
body{margin:0;background:var(--paper);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif}
.wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
.cap{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8a8270;font-weight:600}
.scene{width:380px;height:420px;background:var(--surface);border:1px solid #ddd6c8;border-radius:18px;display:flex;align-items:center;justify-content:center}
.scene svg{width:320px;height:auto;display:block;overflow:visible}
.ln{fill:none;stroke:var(--ink);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.ln-thin{fill:none;stroke:var(--ink);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}
.fill-ink{fill:var(--ink);stroke:none}
.mustache{fill:var(--ink);stroke:none}
.helmet{fill:var(--helmet);stroke:var(--ink);stroke-width:5;stroke-linejoin:round}
.helmet-sh{fill:var(--helmet-d);stroke:none}
.paper-fill{fill:var(--surface)}

/* ===== prop styling ===== */
.cart{fill:none;stroke:var(--ink);stroke-width:4.4;stroke-linecap:round;stroke-linejoin:round}
.cart-fill{fill:var(--surface);stroke:var(--ink);stroke-width:4.4;stroke-linecap:round;stroke-linejoin:round}
.wheel{fill:var(--surface);stroke:var(--ink);stroke-width:4.2}
.wheel-hub{fill:var(--ink);stroke:none}
.box{fill:var(--surface);stroke:var(--ink);stroke-width:4.2;stroke-linecap:round;stroke-linejoin:round}
.box-line{fill:none;stroke:var(--ink);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}
.box-accent{fill:none;stroke:var(--amber);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}
.arm{fill:none;stroke:var(--ink);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}

/* ===== STATIC by default — all motion gated under .play ===== */

/* whole rig rolls forward with a gentle bob */
.play .rig{ animation: roll 2.6s ease-in-out infinite; transform-box: fill-box; }
@keyframes roll{
  0%   { transform: translate(0,0) rotate(0deg); }
  25%  { transform: translate(0,-3px) rotate(-.4deg); }
  50%  { transform: translate(0,0) rotate(0deg); }
  75%  { transform: translate(0,-3px) rotate(.4deg); }
  100% { transform: translate(0,0) rotate(0deg); }
}

/* wheels spin */
.play .wheelSpin{ animation: spin 1.1s linear infinite; transform-box: fill-box; transform-origin: center; }
@keyframes spin{ from{ transform: rotate(0deg);} to{ transform: rotate(360deg);} }

/* the falling product: drops in, settles with a tiny squash, pauses, then loops */
.play .drop{ animation: drop 2.6s ease-in infinite; transform-box: fill-box; transform-origin: center bottom; }
@keyframes drop{
  0%   { transform: translateY(-120px) rotate(-12deg); opacity:0; }
  18%  { transform: translateY(-120px) rotate(-12deg); opacity:0; }
  20%  { opacity:1; }
  46%  { transform: translateY(0) rotate(0deg); opacity:1; }       /* lands */
  52%  { transform: translateY(0) scale(1.06,.9) rotate(0deg); }   /* squash */
  60%  { transform: translateY(0) scale(1,1) rotate(0deg); }       /* settle */
  100% { transform: translateY(0) rotate(0deg); opacity:1; }
}

/* little landing puff lines */
.play .puff{ animation: puff 2.6s ease-out infinite; transform-box: fill-box; transform-origin: center; opacity:0; }
@keyframes puff{
  0%,46%{ opacity:0; transform: scale(.4); }
  52%   { opacity:.8; transform: scale(1); }
  66%   { opacity:0; transform: scale(1.25); }
  100%  { opacity:0; }
}

@media (prefers-reduced-motion: reduce){ .play *{animation:none!important} }
</style>
</head>
<body>
<div class="wrap">
  
  <div class="scene play">
    <svg viewBox="-20 0 340 310" role="img" aria-label="Amigo катит тележку, в корзину падает коробка">

      <!-- ===================== CART (Amigo grips the handle) ===================== -->
      <g class="rig">

        <!-- handle: post Amigo grips at top, sweeping back-down to the basket rim -->
        <path class="cart" d="M196 168 q24 -2 34 22 l8 18"/>

        <!-- basket: trapezoid, wider at top -->
        <path class="cart-fill" d="M210 208 l96 0 -16 58 -64 0 Z"/>
        <!-- basket vertical grid (follow the slanted sides) -->
        <path class="cart" d="M234 208 l-4 58"/>
        <path class="cart" d="M258 208 l-2 58"/>
        <path class="cart" d="M282 208 l2 58"/>
        <!-- basket horizontal grid -->
        <path class="cart" d="M218 238 l80 0"/>

        <!-- legs down to wheels -->
        <path class="cart" d="M228 266 l-6 16"/>
        <path class="cart" d="M288 266 l6 16"/>

        <!-- wheels -->
        <g class="wheelSpin" style="transform-origin:222px 286px">
          <circle class="wheel" cx="222" cy="286" r="12"/>
          <circle class="wheel-hub" cx="222" cy="286" r="3.2"/>
          <path class="ln-thin" d="M222 276 l0 20 M212 286 l20 0"/>
        </g>
        <g class="wheelSpin" style="transform-origin:294px 286px">
          <circle class="wheel" cx="294" cy="286" r="12"/>
          <circle class="wheel-hub" cx="294" cy="286" r="3.2"/>
          <path class="ln-thin" d="M294 276 l0 20 M284 286 l20 0"/>
        </g>

        <!-- landing puff lines above basket rim -->
        <g class="puff" style="transform-origin:258px 206px">
          <path class="ln-thin" d="M238 200 l-8 -6 M258 196 l0 -9 M278 200 l8 -6"/>
        </g>

        <!-- ===================== FALLING PRODUCT (box of tile) ===================== -->
        <g class="drop" style="transform-origin:258px 222px">
          <rect class="box" x="232" y="196" width="52" height="40" rx="3"/>
          <!-- tape cross -->
          <path class="box-line" d="M258 196 l0 40"/>
          <path class="box-line" d="M232 216 l52 0"/>
          <!-- amber accent strip = label -->
          <path class="box-accent" d="M238 206 l16 0"/>
        </g>

      </g>

      <!-- ===================== AMIGO BUST (verbatim geometry) ===================== -->
      <g class="amigo">
        <!-- shoulders -->
        <path class="ln paper-fill" d="M56 260 q0 -54 59 -54 q59 0 59 54"/>
        <path class="ln-thin" d="M95 214 q20 14 40 0"/>
        <path class="ln-thin" d="M115 222 q0 19 0 38"/>
        <!-- head -->
        <g class="head">
          <path class="ln paper-fill" d="M71 134 q-9 1 -8 12 q1 9 9 7"/>
          <path class="ln paper-fill" d="M159 134 q9 1 8 12 q-1 9 -9 7"/>
          <path class="ln paper-fill" d="M71 120 q-3 26 4 38 q11 18 40 18 q29 0 40 -18 q7 -12 4 -38 q-44 -10 -88 0 Z"/>
          <path class="helmet" d="M60 106 q1 -54 55 -54 q54 0 55 54 q-27 -10 -55 -10 q-28 0 -55 10 Z"/>
          <path class="helmet-sh" d="M60 106 q27 -10 55 -10 q28 0 55 10 q-3 7 -11 6 q-44 -9 -88 0 q-8 1 -11 -6 Z"/>
          <path class="ln" d="M115 53 q0 26 0 43" opacity=".5"/>
          <path class="ln" d="M50 106 q65 -19 130 0"/>
          <path class="ln-thin browL" d="M83 117 q9 -5 18 -1"/>
          <path class="ln-thin browR" d="M129 116 q9 -4 18 1"/>
          <ellipse class="eyeL fill-ink" cx="92" cy="130" rx="4.4" ry="5.4"/>
          <ellipse class="eyeR fill-ink" cx="138" cy="130" rx="4.4" ry="5.4"/>
          <path class="ln-thin" d="M115 134 q3 9 0 16 q-3 3 -7 2"/>
          <g class="stache">
            <path class="mustache stacheL" d="M115 154 C 110 159, 102 161, 96 160 C 90 159, 86 156, 86 151 C 86 147, 89 145, 91 148 C 90 152, 94 155, 100 154 C 106 153, 111 151, 115 149 Z"/>
            <path class="mustache stacheR" d="M115 154 C 120 159, 128 161, 134 160 C 140 159, 144 156, 144 151 C 144 147, 141 145, 139 148 C 140 152, 136 155, 130 154 C 124 153, 119 151, 115 149 Z"/>
          </g>
          <path class="ln-thin mouth" d="M105 175 q10 4 20 0"/>
        </g>
      </g>

      <!-- ===================== ARM + HAND on the handle ===================== -->
      <!-- arm from right shoulder reaching out to the handle grip at (196,168) -->
      <path class="arm" d="M170 232 q22 -2 38 -30 q4 -8 -8 -6"/>
      <!-- hand / fist wrapping the handle -->
      <g class="hand">
        <path class="cart-fill" d="M188 158 q14 -3 18 8 q3 11 -9 15 q-13 4 -19 -6 q-4 -13 10 -17 Z"/>
        <path class="ln-thin" d="M188 167 l16 -1 M189 175 l15 -2"/>
      </g>

    </svg>
  </div>
</div>

<script>addEventListener("message",function(e){var s=document.querySelector(".scene");if(s)s.classList.toggle("play",e.data!=="calm");});</script>
</body>
</html>
