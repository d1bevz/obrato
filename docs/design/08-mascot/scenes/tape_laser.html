<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Amigo · 02 Замеры — лазер + рулетка</title>
<style>
:root{--ink:#1b1813;--helmet:#f7b500;--helmet-d:#d49400;--green:#1f9d57;--green-d:#14723d;--surface:#fffdf8;--paper:#f3efe6;--amber:#d98324}
body{margin:0;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.title{color:#6b6456;font-size:13px;letter-spacing:.04em;margin-bottom:10px;text-transform:uppercase}
.scene{width:380px;height:420px;background:var(--surface);border:1px solid #ddd6c8;border-radius:18px;display:flex;align-items:center;justify-content:center}
.scene svg{width:340px;height:auto;display:block;overflow:visible}
.ln{fill:none;stroke:var(--ink);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.ln-thin{fill:none;stroke:var(--ink);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}
.fill-ink{fill:var(--ink);stroke:none}
.mustache{fill:var(--ink);stroke:none}
.helmet{fill:var(--helmet);stroke:var(--ink);stroke-width:5;stroke-linejoin:round}
.helmet-sh{fill:var(--helmet-d);stroke:none}
.paper-fill{fill:var(--surface)}

/* prop styling */
.prop{fill:var(--surface);stroke:var(--ink);stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
.prop-thin{fill:none;stroke:var(--ink);stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.green-glint{fill:none;stroke:var(--green);stroke-width:3;stroke-linecap:round;opacity:.85}
.prop-metal{fill:var(--paper);stroke:var(--ink);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}
.groove{fill:none;stroke:var(--ink);stroke-width:2.2;stroke-linecap:round;opacity:.5}
.wall{fill:none;stroke:var(--ink);stroke-width:4.4;stroke-linecap:round;opacity:.85}
.beam{fill:none;stroke:#e23;stroke-width:2.4;stroke-linecap:round}
.aperture{fill:#e23;stroke:none}
.dot{fill:#e23;stroke:none}

/* ===== STATIC (calm) state: defaults, no animation ===== */
.beam{transform-origin:240px 194px;transform:scaleX(1)}
.dot{transform-origin:340px 138px;opacity:1}

/* ===== ANIMATIONS — ONLY under .play (remove .play => static calm) ===== */
.scene.play .beam{animation:beamShoot 2.4s ease-in-out infinite}
.scene.play .dot{animation:dotPing 2.4s ease-in-out infinite}
.scene.play .laser-arm{animation:aim 2.4s ease-in-out infinite;transform-origin:200px 228px}
.scene.play .tape{animation:swing 3.1s ease-in-out infinite;transform-origin:96px 228px}

@keyframes beamShoot{
  0%   {transform:scaleX(0)}
  18%  {transform:scaleX(1)}
  82%  {transform:scaleX(1)}
  100% {transform:scaleX(1)}
}
@keyframes dotPing{
  0%,16%   {opacity:0;transform:scale(.2)}
  22%      {opacity:1;transform:scale(1.5)}
  30%      {opacity:1;transform:scale(1)}
  55%      {opacity:.55;transform:scale(1)}
  70%      {opacity:1;transform:scale(1.25)}
  85%,100% {opacity:1;transform:scale(1)}
}
@keyframes aim{
  0%,100% {transform:rotate(0deg) translateY(0)}
  20%     {transform:rotate(-1.4deg) translateY(-1px)}
  60%     {transform:rotate(.8deg) translateY(.5px)}
}
@keyframes swing{
  0%,100% {transform:rotate(-2.5deg)}
  50%     {transform:rotate(2.5deg)}
}

@media (prefers-reduced-motion: reduce){ .play *{animation:none!important} }
</style>
</head>
<body>
<div class="title">02 · Замеры — лазер + рулетка</div>
<div class="scene play">
  <svg viewBox="-10 0 360 290" role="img" aria-label="Amigo замеряет лазерным дальномером, рулетка наготове">

    <!-- ===== WALL (background, far right) ===== -->
    <path class="wall" d="M340 84 q4 54 0 108"/>

    <!-- ===== AMIGO BUST — fixed geometry verbatim ===== -->
    <g class="amigo">
      <!-- shoulders -->
      <path class="ln paper-fill" d="M56 260 q0 -54 59 -54 q59 0 59 54"/>
      <path class="ln-thin" d="M95 214 q20 14 40 0"/>
      <path class="ln-thin" d="M115 222 q0 19 0 38"/>
      <!-- head -->
      <g class="head">
        <path class="ln paper-fill" d="M71 134 q-9 1 -8 12 q1 9 9 7"/>
        <path class="ln paper-fill" d="M159 134 q9 1 8 12 q-1 9 -9 7"/>
        <path class="ln paper-fill" d="M71 120 q-3 26 4 38 q11 18 40 18 q29 0 40 -18 q7 -12 4 -38 q-44 -10 -88 0 Z"/>
        <path class="helmet" d="M60 106 q1 -54 55 -54 q54 0 55 54 q-27 -10 -55 -10 q-28 0 -55 10 Z"/>
        <path class="helmet-sh" d="M60 106 q27 -10 55 -10 q28 0 55 10 q-3 7 -11 6 q-44 -9 -88 0 q-8 1 -11 -6 Z"/>
        <path class="ln" d="M115 53 q0 26 0 43" opacity=".5"/>
        <path class="ln" d="M50 106 q65 -19 130 0"/>
        <path class="ln-thin browL" d="M83 117 q9 -5 18 -1"/>
        <path class="ln-thin browR" d="M129 116 q9 -4 18 1"/>
        <ellipse class="eyeL fill-ink" cx="92" cy="130" rx="4.4" ry="5.4"/>
        <ellipse class="eyeR fill-ink" cx="138" cy="130" rx="4.4" ry="5.4"/>
        <path class="ln-thin" d="M115 134 q3 9 0 16 q-3 3 -7 2"/>
        <g class="stache">
          <path class="mustache stacheL" d="M115 154 C 110 159, 102 161, 96 160 C 90 159, 86 156, 86 151 C 86 147, 89 145, 91 148 C 90 152, 94 155, 100 154 C 106 153, 111 151, 115 149 Z"/>
          <path class="mustache stacheR" d="M115 154 C 120 159, 128 161, 134 160 C 140 159, 144 156, 144 151 C 144 147, 141 145, 139 148 C 140 152, 136 155, 130 154 C 124 153, 119 151, 115 149 Z"/>
        </g>
        <path class="ln-thin mouth" d="M105 175 q10 4 20 0"/>
      </g>
    </g>

    <!-- ===== LEFT ARM + TAPE MEASURE (real case, ready at belt) ===== -->
    <!-- forearm from left shoulder down to the case -->
    <path class="ln-thin" d="M72 224 q6 18 18 24" fill="none"/>
    <g class="tape">
      <!-- belt clip riveted to the right side of the case -->
      <path class="prop-metal" d="M111 232 q11 -1 11 11 q0 10 -7 14" fill="none" stroke-width="4"/>
      <circle class="fill-ink" cx="113" cy="234" r="1.7"/>

      <!-- metal blade exiting the bottom-left, curving out in an arc, with L-hook -->
      <path class="prop-metal" d="M82 257 q-17 10 -31 9" fill="none" stroke-width="5.4"/>
      <path class="prop-thin" d="M83 262 q-16 9 -29 8.5" opacity=".4"/>
      <!-- L-shaped steel end hook (bent tab at the tape's tip) -->
      <path class="prop-metal" d="M51 266 q-6 -1 -7 5 q-1 6 2 12" fill="none" stroke-width="4.8"/>

      <!-- tape case: rounded-square body -->
      <rect class="prop" x="79" y="226" width="35" height="34" rx="10"/>
      <!-- reel disc seen through the case -->
      <circle class="prop-thin" cx="96.5" cy="244" r="9"/>
      <circle class="prop-thin" cx="96.5" cy="244" r="3.4"/>
      <circle class="fill-ink" cx="96.5" cy="244" r="1.6"/>

      <!-- lock / stop button on top of the case -->
      <rect class="prop" x="88" y="218" width="17" height="10" rx="3.5"/>
      <line x1="92" y1="223" x2="101" y2="223" class="groove"/>
      <!-- mouth slot where the blade feeds out -->
      <path class="prop-thin" d="M79 252 q-3 3 -3 6" opacity=".55"/>

      <!-- grip hand over the case -->
      <path class="ln-thin" d="M89 220 q-7 5 -8 16" fill="none"/>
      <path class="ln-thin" d="M104 220 q8 5 9 16" fill="none"/>
    </g>

    <!-- ===== RIGHT ARM + LASER RANGEFINDER (Bosch GLM style, portrait) ===== -->
    <g class="laser-arm">
      <!-- forearm from right shoulder out to device -->
      <path class="ln-thin" d="M168 226 q24 8 40 -2" fill="none"/>

      <!-- rangefinder body: tall rounded-rectangle case -->
      <rect class="prop" x="214" y="188" width="32" height="62" rx="9"/>
      <!-- top end-cap seam (where the laser aperture sits) -->
      <path class="prop-thin" d="M214 200 q16 -5 32 0"/>
      <!-- laser aperture at top-right of the end cap, beam exits here -->
      <circle class="prop-thin" cx="240" cy="194" r="3.6"/>
      <circle class="aperture" cx="240" cy="194" r="1.7"/>

      <!-- DISPLAY with measured value -->
      <rect x="219" y="204" width="22" height="15" rx="2.5" fill="var(--surface)" stroke="var(--ink)" stroke-width="2.4"/>
      <text x="230" y="215.4" text-anchor="middle" font-family="Menlo,Consolas,monospace" font-weight="700" font-size="9" fill="var(--ink)" letter-spacing=".3">2.45</text>

      <!-- buttons: green 'measure' (top) + plain button (below) -->
      <circle cx="224.5" cy="228" r="4.2" fill="var(--green)" stroke="var(--ink)" stroke-width="2"/>
      <path d="M222.6 228 l1.4 1.5 l2.6 -3" fill="none" stroke="var(--surface)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="236.5" cy="228" r="4.2" class="prop-thin"/>
      <line x1="236.5" y1="226.2" x2="236.5" y2="229.8" class="prop-thin"/>

      <!-- side grip grooves near base -->
      <path class="groove" d="M219 238 h22"/>
      <path class="groove" d="M219 242 h22"/>

      <!-- gripping hand wrapping the lower body -->
      <path class="ln-thin" d="M208 224 q5 -6 13 -5" fill="none"/>
      <path class="ln-thin" d="M210 232 q-3 6 2 11" fill="none"/>
      <path class="ln-thin" d="M213 244 q4 6 12 6" fill="none"/>
    </g>

    <!-- ===== LASER BEAM + DOT (from aperture, hitting wall) ===== -->
    <line class="beam" x1="240" y1="194" x2="338" y2="138"/>
    <circle class="dot" cx="338" cy="138" r="4.2"/>

  </svg>
</div>

<script>addEventListener("message",function(e){var s=document.querySelector(".scene");if(s)s.classList.toggle("play",e.data!=="calm");});</script>
</body>
</html>
