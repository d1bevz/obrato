<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Amigo · 02 Замеры — лазер + рулетка</title>
<style>
:root{--ink:#1b1813;--helmet:#f7b500;--helmet-d:#d49400;--green:#1f9d57;--green-d:#14723d;--surface:#fffdf8;--paper:#f3efe6;--amber:#d98324}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.title{color:#6b6456;font-size:13px;letter-spacing:.04em;margin-bottom:10px;text-transform:uppercase}
.scene{position:relative;width:380px;height:420px;background:var(--surface);border:1px solid #ddd6c8;border-radius:18px;display:flex;align-items:center;justify-content:center}
.scene svg{width:336px;height:auto;display:block;overflow:visible}
.ln{fill:none;stroke:var(--ink);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.ln-thin{fill:none;stroke:var(--ink);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}
.fill-ink{fill:var(--ink);stroke:none}
.mustache{fill:var(--ink);stroke:none}
  .hl{fill:var(--surface)}
.helmet{fill:var(--helmet);stroke:var(--ink);stroke-width:5;stroke-linejoin:round}
.helmet-sh{fill:var(--helmet-d);stroke:none}
.paper-fill{fill:var(--surface)}

/* prop styling */
.prop{fill:var(--surface);stroke:var(--ink);stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
.prop-thin{fill:none;stroke:var(--ink);stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.prop-metal{fill:var(--paper);stroke:var(--ink);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}
.groove{fill:none;stroke:var(--ink);stroke-width:2.2;stroke-linecap:round;opacity:.5}
.wall{fill:none;stroke:var(--ink);stroke-width:4.4;stroke-linecap:round;opacity:.8}
.beam{fill:none;stroke:#e23;stroke-width:2.6;stroke-linecap:round}
.aperture{fill:#e23;stroke:none}
.dot{fill:#e23;stroke:none}
.hand-fill{fill:var(--surface);stroke:var(--ink);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}

/* ===== STATIC (calm) state defaults — no animation ===== */
/* beam length ~= hypot(320-268,118-180) ~= 81; draw it along its own axis with a dash */
.beam{stroke-dasharray:82;stroke-dashoffset:0}
.dot{transform-origin:320px 118px;opacity:1;transform:scale(1)}

/* ===== ANIMATIONS — ONLY under .play (remove .play => static calm) ===== */
.scene.play .beam{animation:beamShoot 2.6s ease-in-out infinite}
.scene.play .dot{animation:dotPing 2.6s ease-in-out infinite}
.scene.play .laser-arm{animation:aim 2.6s ease-in-out infinite;transform-origin:200px 220px}
.scene.play .eyeL,.scene.play .eyeR{animation:blink 5.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}

/* beam "doezzhaet" (travels) from the aperture to the wall along its real path */
@keyframes beamShoot{
  0%   {stroke-dashoffset:82}
  16%  {stroke-dashoffset:0}
  46%  {stroke-dashoffset:0}
  54%  {stroke-dashoffset:0;opacity:.55}
  62%  {opacity:1}
  100% {stroke-dashoffset:0}
}
@keyframes dotPing{
  0%,14%   {opacity:0;transform:scale(.2)}
  20%      {opacity:1;transform:scale(1.55)}
  28%      {opacity:1;transform:scale(1)}
  52%      {opacity:.5;transform:scale(1)}
  66%      {opacity:1;transform:scale(1.3)}
  80%,100% {opacity:1;transform:scale(1)}
}
@keyframes aim{
  0%,100% {transform:rotate(0deg) translateY(0)}
  22%     {transform:rotate(-1.2deg) translateY(-1px)}
  60%     {transform:rotate(.7deg) translateY(.5px)}
}
@keyframes blink{0%,92%,100%{transform:scaleY(1)}95.5%{transform:scaleY(.08)}}

@media (prefers-reduced-motion: reduce){ .play *{animation:none!important} }
</style>
</head>
<body>
<div class="title">02 · Замеры — лазер + рулетка</div>
<div class="scene play">
  <svg viewBox="16 38 324 276" role="img" aria-label="Amigo целится лазерным дальномером в стену, рулетка на поясе">

    <!-- ===== WALL (background, right) ===== -->
    <path class="wall" d="M322 78 q4 50 0 100"/>

    <!-- ===== AMIGO BUST — fixed geometry verbatim, nudged up-left via group ===== -->
    <g class="amigo" transform="translate(-4,-2)">
      <!-- shoulders -->
      <path class="ln paper-fill" d="M56 260 q0 -54 59 -54 q59 0 59 54"/>
      <path class="ln-thin" d="M95 214 q20 14 40 0"/>
      <path class="ln-thin" d="M115 222 q0 19 0 38"/>
      <!-- head -->
      <g class="head">
    <path class="ln paper-fill" d="M63 143 q-11 1 -10 13 q1 10 11 7"/>
    <path class="ln paper-fill" d="M167 143 q11 1 10 13 q-1 10 -11 7"/>
    <path class="ln paper-fill" d="M64 118 C 58 140 60 162 75 173 C 88 182 102 186 115 186 C 128 186 142 182 155 173 C 170 162 172 140 166 118 C 132 110 98 110 64 118 Z"/>
    <path class="helmet" d="M58 110 q1 -56 57 -56 q56 0 57 56 q-28 -10 -57 -10 q-29 0 -57 10 Z"/>
    <path class="helmet-sh" d="M58 110 q28 -10 57 -10 q29 0 57 10 q-3 7 -11 6 q-46 -9 -92 0 q-8 1 -11 -6 Z"/>
    <path class="ln" d="M115 55 q0 27 0 45" opacity=".5"/>
    <path class="ln" d="M48 110 q67 -20 134 0"/>
    <circle class="fill-ink" cx="92" cy="124" r="6.4"/>
    <circle class="fill-ink" cx="138" cy="124" r="6.4"/>
    <circle class="hl" cx="94.3" cy="121.7" r="2"/>
    <circle class="hl" cx="140.3" cy="121.7" r="2"/>
    <path class="ln-thin" d="M111 134 q4 8 4 11 q0 4 5 3"/>
    <g class="stache"><path class="mustache" d="M115 158 C 127 152 140 150 152 151 C 162 152 169 147 173 131 C 171 140 167 149 160 155 C 151 162 140 166 129 168 C 123 169 118 169 115 170 Z"/><path class="mustache" d="M115 158 C 127 152 140 150 152 151 C 162 152 169 147 173 131 C 171 140 167 149 160 155 C 151 162 140 166 129 168 C 123 169 118 169 115 170 Z" transform="translate(230,0) scale(-1,1)"/></g>
    <path class="ln-thin mouth" d="M105 181 q10 6 20 0"/>
  </g>
    </g>

    <!-- ===== LEFT SIDE — TAPE MEASURE clipped LOW on the belt (well below + left of laser) ===== -->
    <g class="tape" transform="translate(6,-8)">
      <!-- belt strap segment behind the case -->
      <path class="prop-metal" d="M40 254 h54" stroke-width="6" opacity=".55"/>
      <!-- belt clip hooking over the strap (top of case) -->
      <path class="prop-metal" d="M58 250 q-2 -8 6 -9 q8 -1 8 8" fill="none" stroke-width="3.6"/>
      <circle class="fill-ink" cx="64" cy="244" r="1.6"/>

      <!-- tape case: rounded-square body, sitting at the belt -->
      <rect class="prop" x="44" y="252" width="40" height="38" rx="11"/>
      <!-- reel disc seen through the case -->
      <circle class="prop-thin" cx="64" cy="271" r="10"/>
      <circle class="prop-thin" cx="64" cy="271" r="3.6"/>
      <circle class="fill-ink" cx="64" cy="271" r="1.7"/>
      <!-- lock / stop button on top of the case -->
      <rect class="prop" x="55" y="244" width="18" height="10" rx="3.5"/>
      <line x1="59" y1="249" x2="69" y2="249" class="groove"/>

      <!-- short metal blade poking out the bottom with L-hook, kept tight to the case -->
      <path class="prop-metal" d="M48 288 q-9 6 -18 6" fill="none" stroke-width="5.2"/>
      <path class="prop-thin" d="M49 292 q-8 5 -16 5.5" opacity=".4"/>
      <!-- L-shaped steel end hook -->
      <path class="prop-metal" d="M30 294 q-5 0 -6 5 q-1 5 2 9" fill="none" stroke-width="4.6"/>
      <!-- mouth slot where blade feeds out -->
      <path class="prop-thin" d="M48 284 q-3 2 -3 5" opacity=".5"/>
    </g>

    <!-- ===== RIGHT ARM (extended) + LASER RANGEFINDER held in a real grip ===== -->
    <!-- Device is built UPRIGHT, then the whole unit is rotated +34deg about the grip
         point (240,222) so it tilts up-right toward the wall. Aperture lands at ~(268,180),
         the grip/lower body lands at ~(220..247, 222..241): the fist wraps there. -->
    <g class="laser-arm">
      <!-- forearm: from right shoulder reaching forward/out to the wrist at the grip -->
      <path class="ln" d="M170 224 q24 4 46 -4"/>

      <g transform="rotate(34 240 222)">
        <!-- body: tall rounded-rectangle case -->
        <rect class="prop" x="224" y="166" width="32" height="68" rx="9"/>
        <!-- top end-cap seam where the aperture sits -->
        <path class="prop-thin" d="M224 178 q16 -5 32 0"/>
        <!-- laser aperture at the very top, beam exits here -->
        <circle class="prop-thin" cx="240" cy="172" r="3.8"/>
        <circle class="aperture" cx="240" cy="172" r="1.8"/>
        <!-- DISPLAY with measured value -->
        <rect x="229" y="183" width="22" height="16" rx="2.5" fill="var(--surface)" stroke="var(--ink)" stroke-width="2.4"/>
        <text x="240" y="194.8" text-anchor="middle" font-family="Menlo,Consolas,monospace" font-weight="700" font-size="9" fill="var(--ink)" letter-spacing=".3">2.45</text>
        <!-- buttons: green 'measure' (left) + plain (right) -->
        <circle cx="233" cy="209" r="4.3" fill="var(--green)" stroke="var(--ink)" stroke-width="2"/>
        <path d="M231 209 l1.5 1.6 l2.7 -3.1" fill="none" stroke="var(--surface)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="247" cy="209" r="4.3" class="prop-thin"/>
        <line x1="247" y1="207.2" x2="247" y2="210.8" class="prop-thin"/>
      </g>

      <!-- ===== GRIP HAND: real fist wrapping the lower body of the tilted device =====
           Drawn AFTER the device so fingers + thumb overlap the case -> reads as held. -->
      <!-- back of the fist / palm mass cupping the underside of the lower body -->
      <path class="hand-fill" d="M209 240 q-10 -2 -11 -13 q-1 -11 11 -13 q9 -1 14 5 l8 10 q4 6 -1 12 q-7 8 -18 6 q-2 0 -3 -1 Z"/>
      <!-- four fingers curling OVER the front face of the body (overlap the case) -->
      <path class="hand-fill" d="M225 223 q9 -2 11 5 q1 6 -6 8"/>
      <path class="hand-fill" d="M228 231 q8 -1 9 5 q0 5 -7 7"/>
      <path class="hand-fill" d="M229 239 q7 0 8 5 q0 4 -6 6"/>
      <!-- thumb pressing up the near side of the body -->
      <path class="hand-fill" d="M215 222 q-4 -7 3 -11 q7 -3 11 3"/>
      <!-- knuckle creases for grip read -->
      <path class="ln-thin" d="M232 226 q1 4 -2 7" opacity=".7"/>
      <path class="ln-thin" d="M234 234 q1 3 -2 6" opacity=".7"/>
    </g>

    <!-- ===== LASER BEAM + DOT (from rotated aperture ~(268,180) to the wall) ===== -->
    <line class="beam" x1="268" y1="180" x2="320" y2="118"/>
    <circle class="dot" cx="320" cy="118" r="4.4"/>

  </svg>
</div>

<script>addEventListener("message",function(e){var s=document.querySelector(".scene");if(s)s.classList.toggle("play",e.data!=="calm");});</script>
</body>
</html>
