<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Amigo · 01 Выбор объектов — планшет</title>
<style>
:root{--ink:#1b1813;--helmet:#f7b500;--helmet-d:#d49400;--green:#1f9d57;--green-d:#14723d;--surface:#fffdf8;--paper:#f3efe6;--amber:#d98324}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.scene{position:relative;width:380px;height:420px;background:var(--surface);border:1px solid #ddd6c8;border-radius:18px;display:flex;align-items:center;justify-content:center}
.scene svg{width:340px;height:auto;display:block;overflow:visible}

.ln{fill:none;stroke:var(--ink);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.ln-thin{fill:none;stroke:var(--ink);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}
.fill-ink{fill:var(--ink);stroke:none}
.mustache{fill:var(--ink);stroke:none}
  .mcurl{fill:none;stroke:var(--ink);stroke-width:10;stroke-linecap:round;stroke-linejoin:round}
  .hl{fill:var(--surface)}
.helmet{fill:var(--helmet);stroke:var(--ink);stroke-width:5;stroke-linejoin:round}
.helmet-sh{fill:var(--helmet-d);stroke:none}
.paper-fill{fill:var(--surface)}

/* ── prop: realistic tablet ── */
.skin{fill:var(--paper);stroke:var(--ink);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.tablet-shell{fill:var(--surface);stroke:var(--ink);stroke-width:5;stroke-linejoin:round}
.tablet-screen{fill:var(--paper);stroke:var(--ink);stroke-width:3}
.tablet-cam{fill:var(--surface);stroke:var(--ink);stroke-width:2.2}
.tablet-home{fill:none;stroke:var(--ink);stroke-width:3;stroke-linecap:round;opacity:.5}
.row-icon{fill:var(--surface);stroke:var(--ink);stroke-width:2.8;stroke-linejoin:round}
.row-line{fill:none;stroke:var(--ink);stroke-width:3.2;stroke-linecap:round;opacity:.5}
.row-line-2{fill:none;stroke:var(--ink);stroke-width:3;stroke-linecap:round;opacity:.32}
.row-hi{fill:none;stroke:var(--green);stroke-width:3.6}
.row-hi-fill{fill:var(--green);opacity:.12}
.tap-ring{fill:none;stroke:var(--green);stroke-width:4}

/* ── ALL animation gated under .play (calm/static otherwise) ── */
.play .tap-arm{animation:tap-poke 3.4s ease-in-out infinite;transform-box:view-box;transform-origin:240px 200px}
.play .tap-ring{animation:tap-ring 3.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.play .row-hi,.play .row-hi-fill{animation:row-flash 3.4s ease-in-out infinite}
.play .rig{animation:breathe 3.4s ease-in-out infinite;transform-box:view-box;transform-origin:150px 220px}

@keyframes tap-poke{0%,28%,100%{transform:translate(0,0)}44%,56%{transform:translate(5px,-5px)}}
@keyframes tap-ring{0%,40%,100%{opacity:0;transform:scale(.35)}50%{opacity:.9;transform:scale(1)}72%{opacity:0;transform:scale(1.5)}}
@keyframes row-flash{0%,38%,100%{opacity:0}52%{opacity:1}82%{opacity:0}}
@keyframes breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(1.5px)}}

@media (prefers-reduced-motion: reduce){ .play *{animation:none!important} .play .row-hi,.play .row-hi-fill{opacity:1} }
</style>
</head>
<body>

  <div class="scene play">
    <svg viewBox="-20 20 360 320" role="img" aria-label="Amigo выбирает объект на планшете">

      <!-- ░░░░░ AMIGO BUST — fixed geometry, verbatim (shifted up & slightly left to free room for the tablet) ░░░░░ -->
      <g class="amigo" transform="translate(-6 -14)">
        <!-- shoulders -->
        <path class="ln paper-fill" d="M56 260 q0 -54 59 -54 q59 0 59 54"/>
        <path class="ln-thin" d="M95 214 q20 14 40 0"/>
        <path class="ln-thin" d="M115 222 q0 19 0 38"/>
        <!-- head -->
        <g class="head">
    <path class="ln paper-fill" d="M63 143 q-11 1 -10 13 q1 10 11 7"/>
    <path class="ln paper-fill" d="M167 143 q11 1 10 13 q-1 10 -11 7"/>
    <path class="ln paper-fill" d="M64 118 C 58 140 60 162 75 173 C 88 182 102 186 115 186 C 128 186 142 182 155 173 C 170 162 172 140 166 118 C 132 110 98 110 64 118 Z"/>
    <path class="helmet" d="M58 110 q1 -56 57 -56 q56 0 57 56 q-28 -10 -57 -10 q-29 0 -57 10 Z"/>
    <path class="helmet-sh" d="M58 110 q28 -10 57 -10 q29 0 57 10 q-3 7 -11 6 q-46 -9 -92 0 q-8 1 -11 -6 Z"/>
    <path class="ln" d="M115 55 q0 27 0 45" opacity=".5"/>
    <path class="ln" d="M48 110 q67 -20 134 0"/>
    <circle class="fill-ink" cx="92" cy="124" r="6.4"/>
    <circle class="fill-ink" cx="138" cy="124" r="6.4"/>
    <circle class="hl" cx="94.3" cy="121.7" r="2"/>
    <circle class="hl" cx="140.3" cy="121.7" r="2"/>
    <path class="ln-thin" d="M111 134 q4 8 4 11 q0 4 5 3"/>
    <g class="stache"><path class="mustache" d="M115 161 C 104 157 90 157 80 161 C 74 163 73 167 79 169 C 90 172 102 171 115 169 C 128 171 140 172 151 169 C 157 167 156 163 150 161 C 140 157 126 157 115 161 Z"/><path class="mcurl" d="M150 166 C 162 163 171 154 167 139"/><path class="mcurl" d="M80 166 C 68 163 59 154 63 139"/></g>
    <path class="ln-thin mouth" d="M105 181 q10 6 20 0"/>
  </g>
      </g>

      <!-- ░░ HOLDING ARM (Amigo's right, viewer-left): forearm rises from left shoulder; ░░
           ░░ the hand cups the LOWER-LEFT corner of the tablet, fingers wrap the bottom ░░ -->
      <!-- forearm: from left shoulder up toward the tablet's bottom-left corner -->
      <path class="ln paper-fill" d="M58 232 q-14 8 -14 26 q0 16 16 23"/>

      <!-- ░░ TABLET RIG — held in front of the chest, tilted for natural reading ░░ -->
      <g class="rig">
        <g transform="rotate(-9 150 222)">
          <!-- outer shell: portrait tablet with uniform bezel -->
          <rect class="tablet-shell" x="92" y="166" width="116" height="120" rx="14"/>
          <!-- front camera dot, centred on top bezel -->
          <circle class="tablet-cam" cx="150" cy="174" r="2"/>
          <!-- screen inset uniformly inside bezel -->
          <rect class="tablet-screen" x="101" y="181" width="98" height="86" rx="4"/>
          <!-- home indicator on bottom bezel -->
          <line class="tablet-home" x1="141" y1="277" x2="159" y2="277"/>

          <!-- clean list: 3 rows = square icon + 2 text lines -->
          <!-- row 1 -->
          <rect class="row-icon" x="108" y="189" width="15" height="15" rx="3"/>
          <line class="row-line"   x1="131" y1="194" x2="190" y2="194"/>
          <line class="row-line-2" x1="131" y1="200.5" x2="174" y2="200.5"/>

          <!-- row 2 (the one being tapped / highlighted) -->
          <rect class="row-hi-fill" x="104" y="213" width="92" height="22" rx="4"/>
          <rect class="row-hi"      x="104" y="213" width="92" height="22" rx="4"/>
          <rect class="row-icon"    x="108" y="216" width="15" height="15" rx="3"/>
          <line class="row-line"   x1="131" y1="221" x2="190" y2="221"/>
          <line class="row-line-2" x1="131" y1="227.5" x2="170" y2="227.5"/>

          <!-- row 3 -->
          <rect class="row-icon" x="108" y="244" width="15" height="15" rx="3"/>
          <line class="row-line"   x1="131" y1="249" x2="186" y2="249"/>
          <line class="row-line-2" x1="131" y1="255.5" x2="166" y2="255.5"/>
        </g>

        <!-- ░░ HOLDING HAND — grips the LEFT EDGE / lower-left corner of the tablet ░░
             palm behind the edge, thumb on the front face, fingers curl over the edge -->
        <!-- palm: rounded heel of the hand cupping under the bottom-left corner -->
        <path class="skin" d="M70 296 q-16 -3 -20 -19 q-4 -16 9 -25 q9 -6 19 -3"/>
        <!-- THUMB laid up the FRONT face along the screen's left margin -->
        <path class="skin" d="M84 247 q-9 5 -10 17 q-1 9 5 16"/>
        <!-- four FINGERS curling over the left edge onto the front, snug fingertips -->
        <path class="ln-thin" d="M90 252 q9 2 8 10"/>
        <path class="ln-thin" d="M87 261 q9 2 8 10"/>
        <path class="ln-thin" d="M84 270 q9 2 8 10"/>
        <path class="ln-thin" d="M80 279 q9 2 8 10"/>
      </g>

      <!-- ░░ TAPPING ARM (Amigo's left, viewer-right): forearm from right shoulder; ░░
           ░░ closed fist with a single extended index finger pressing row 2 of the screen ░░ -->
      <g class="tap-arm">
        <!-- forearm sweeping in from the right shoulder up toward the screen -->
        <path class="ln paper-fill" d="M236 258 q22 -7 21 -28 q-1 -15 -16 -21"/>
        <!-- hand: closed fist (back-of-hand curl) nestled just right of the tablet's edge -->
        <path class="skin" d="M222 199 q14 -7 23 3 q8 9 3 21 q-5 12 -19 10 q-9 -2 -11 -11"/>
        <!-- curled-knuckle hints on the back of the fist -->
        <path class="ln-thin" d="M238 200 q7 3 7 11"/>
        <path class="ln-thin" d="M245 207 q5 4 3 11"/>
        <!-- extended index finger reaching LEFT, fingertip pressing onto row 2 of the screen -->
        <path class="ln" d="M223 207 l-32 13"/>
        <!-- tap ripple ring at the fingertip, centred on the highlighted row 2 -->
        <circle class="tap-ring" cx="188" cy="221" r="9"/>
      </g>

    </svg>
  </div>

<script>addEventListener("message",function(e){var s=document.querySelector(".scene");if(s)s.classList.toggle("play",e.data!=="calm");});</script>
</body>
</html>
