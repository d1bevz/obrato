<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Amigo · 01 Выбор объектов</title>
<style>
:root{--ink:#1b1813;--helmet:#f7b500;--helmet-d:#d49400;--green:#1f9d57;--green-d:#14723d;--surface:#fffdf8;--paper:#f3efe6;--amber:#d98324}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.stage{display:flex;flex-direction:column;align-items:center;gap:10px}
.cap{font-size:12px;letter-spacing:.04em;color:#8a8174;text-transform:uppercase}
.cap b{color:var(--green-d);font-weight:600}
.scene{position:relative;width:380px;height:420px;background:var(--surface);border:1px solid #ddd6c8;border-radius:18px;display:flex;align-items:center;justify-content:center}
.scene svg{width:300px;height:auto;display:block;overflow:visible}

.ln{fill:none;stroke:var(--ink);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.ln-thin{fill:none;stroke:var(--ink);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}
.fill-ink{fill:var(--ink);stroke:none}
.mustache{fill:var(--ink);stroke:none}
.helmet{fill:var(--helmet);stroke:var(--ink);stroke-width:5;stroke-linejoin:round}
.helmet-sh{fill:var(--helmet-d);stroke:none}
.paper-fill{fill:var(--surface)}

/* prop */
.tablet-shell{fill:var(--surface);stroke:var(--ink);stroke-width:5;stroke-linejoin:round}
.tablet-screen{fill:var(--paper);stroke:var(--ink);stroke-width:3}
.tablet-cam{fill:var(--surface);stroke:var(--ink);stroke-width:2.2}
.tablet-home{fill:none;stroke:var(--ink);stroke-width:3;stroke-linecap:round;opacity:.55}
.row-icon{fill:var(--surface);stroke:var(--ink);stroke-width:2.8;stroke-linejoin:round}
.row-line{fill:none;stroke:var(--ink);stroke-width:3.2;stroke-linecap:round;opacity:.5}
.row-line-2{fill:none;stroke:var(--ink);stroke-width:3;stroke-linecap:round;opacity:.32}
.row-hi{fill:none;stroke:var(--green);stroke-width:3.6}
.row-hi-fill{fill:var(--green);opacity:.12}
.tap-ring{fill:none;stroke:var(--green);stroke-width:4}

/* ── ALL animation gated under .play (calm/static otherwise) ── */
.play .tablet-rig{animation:tab-rock 3.6s ease-in-out infinite;transform-box:view-box;transform-origin:150px 203px}
.play .tap-arm{animation:tap-poke 3.6s ease-in-out infinite;transform-box:view-box;transform-origin:62px 218px}
.play .tap-ring{animation:tap-ring 3.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.play .row-hi,.play .row-hi-fill{animation:row-flash 3.6s ease-in-out infinite}
.play .swipeStack{animation:swipe 3.6s ease-in-out infinite;transform-box:view-box;transform-origin:150px 203px}

@keyframes tab-rock{0%,100%{transform:rotate(-1.4deg)}40%{transform:rotate(1.6deg)}70%{transform:rotate(.4deg)}}
@keyframes tap-poke{0%,30%,100%{transform:translate(0,0)}45%,55%{transform:translate(7px,-6px) rotate(-2deg)}}
@keyframes tap-ring{0%,42%,100%{opacity:0;transform:scale(.35)}50%{opacity:.9;transform:scale(1)}72%{opacity:0;transform:scale(1.5)}}
@keyframes row-flash{0%,40%,100%{opacity:0}52%{opacity:1}80%{opacity:0}}
@keyframes swipe{0%,12%{transform:translateY(8px);opacity:.0}24%,100%{transform:translateY(0);opacity:1}}

@media (prefers-reduced-motion: reduce){ .play *{animation:none!important} .play .row-hi,.play .row-hi-fill{opacity:1} }
</style>
</head>
<body>
<div class="stage">
  
  <div class="scene play">
    <svg viewBox="-24 30 330 280" role="img" aria-label="Amigo выбирает объект на планшете">

      <!-- ░░ BACK ARM: holding hand from right shoulder cups the tablet's right edge ░░ -->
      <path class="ln paper-fill" d="M174 224 q33 -3 45 18 q9 18 -4 32"/>
      <!-- palm cupping the lower-right corner, thumb resting on the front face -->
      <path class="ln paper-fill" d="M215 274 q9 -11 1 -24 q-8 -13 -27 -12"/>
      <!-- 3 fingertips peeking over the right edge -->
      <path class="ln-thin" d="M201 250 q12 0 13 11"/>
      <path class="ln-thin" d="M196 257 q12 0 12 11"/>
      <path class="ln-thin" d="M191 264 q12 0 11 11"/>

      <!-- ░░░░░ AMIGO BUST — fixed geometry, verbatim ░░░░░ -->
      <g class="amigo">
        <!-- shoulders -->
        <path class="ln paper-fill" d="M56 260 q0 -54 59 -54 q59 0 59 54"/>
        <path class="ln-thin" d="M95 214 q20 14 40 0"/>
        <path class="ln-thin" d="M115 222 q0 19 0 38"/>
        <!-- head -->
        <g class="head">
          <path class="ln paper-fill" d="M71 134 q-9 1 -8 12 q1 9 9 7"/>
          <path class="ln paper-fill" d="M159 134 q9 1 8 12 q-1 9 -9 7"/>
          <path class="ln paper-fill" d="M71 120 q-3 26 4 38 q11 18 40 18 q29 0 40 -18 q7 -12 4 -38 q-44 -10 -88 0 Z"/>
          <path class="helmet" d="M60 106 q1 -54 55 -54 q54 0 55 54 q-27 -10 -55 -10 q-28 0 -55 10 Z"/>
          <path class="helmet-sh" d="M60 106 q27 -10 55 -10 q28 0 55 10 q-3 7 -11 6 q-44 -9 -88 0 q-8 1 -11 -6 Z"/>
          <path class="ln" d="M115 53 q0 26 0 43" opacity=".5"/>
          <path class="ln" d="M50 106 q65 -19 130 0"/>
          <path class="ln-thin browL" d="M83 117 q9 -5 18 -1"/>
          <path class="ln-thin browR" d="M129 116 q9 -4 18 1"/>
          <ellipse class="eyeL fill-ink" cx="92" cy="130" rx="4.4" ry="5.4"/>
          <ellipse class="eyeR fill-ink" cx="138" cy="130" rx="4.4" ry="5.4"/>
          <path class="ln-thin" d="M115 134 q3 9 0 16 q-3 3 -7 2"/>
          <g class="stache">
            <path class="mustache stacheL" d="M115 154 C 110 159, 102 161, 96 160 C 90 159, 86 156, 86 151 C 86 147, 89 145, 91 148 C 90 152, 94 155, 100 154 C 106 153, 111 151, 115 149 Z"/>
            <path class="mustache stacheR" d="M115 154 C 120 159, 128 161, 134 160 C 140 159, 144 156, 144 151 C 144 147, 141 145, 139 148 C 140 152, 136 155, 130 154 C 124 153, 119 151, 115 149 Z"/>
          </g>
          <path class="ln-thin mouth" d="M105 175 q10 4 20 0"/>
        </g>
      </g>

      <!-- ░░ TABLET RIG (front of bust, mid-chest) ░░ -->
      <g class="tablet-rig">
        <!-- realistic portrait tablet, tilted slightly; uniform ~7px bezel all round -->
        <g transform="rotate(-7 150 204)">
          <!-- outer shell -->
          <rect class="tablet-shell" x="100" y="152" width="100" height="104" rx="13"/>
          <!-- front-facing camera dot, centred on the TOP bezel -->
          <circle class="tablet-cam" cx="150" cy="159.5" r="2"/>
          <!-- screen, inset uniformly inside the bezel -->
          <rect class="tablet-screen" x="108" y="166" width="84" height="74" rx="4"/>
          <!-- home indicator: thin bar centred on the BOTTOM bezel -->
          <line class="tablet-home" x1="142" y1="248" x2="158" y2="248"/>

          <!-- clean list: 3 rows, each = square icon + 2 text lines (swipe stack slides up) -->
          <g class="swipeStack">
            <!-- row 1 -->
            <rect class="row-icon" x="114" y="173" width="14" height="14" rx="3"/>
            <line class="row-line"   x1="135" y1="178" x2="184" y2="178"/>
            <line class="row-line-2" x1="135" y1="184" x2="170" y2="184"/>

            <!-- row 2 (the one being tapped / highlighted) -->
            <rect class="row-hi-fill" x="111" y="195" width="78" height="20" rx="4"/>
            <rect class="row-hi"      x="111" y="195" width="78" height="20" rx="4"/>
            <rect class="row-icon"    x="114" y="198" width="14" height="14" rx="3"/>
            <line class="row-line"   x1="135" y1="203" x2="184" y2="203"/>
            <line class="row-line-2" x1="135" y1="209" x2="166" y2="209"/>

            <!-- row 3 -->
            <rect class="row-icon" x="114" y="223" width="14" height="14" rx="3"/>
            <line class="row-line"   x1="135" y1="228" x2="180" y2="228"/>
            <line class="row-line-2" x1="135" y1="234" x2="162" y2="234"/>
          </g>
        </g>
      </g>

      <!-- ░░ FRONT ARM: tapping hand from left shoulder, index finger lands on row 2 ░░ -->
      <g class="tap-arm">
        <!-- forearm from left shoulder reaching up to screen -->
        <path class="ln paper-fill" d="M60 218 q-12 14 0 30 q10 14 30 11"/>
        <!-- hand: knuckles + extended index finger pointing up at the highlighted row -->
        <path class="ln-thin paper-fill" d="M86 252 q11 8 23 4 q7 -2 9 -9"/>
        <path class="ln" d="M118 247 l14 -38"/>
        <!-- tap ripple ring at fingertip on row 2 -->
        <circle class="tap-ring" cx="133" cy="205" r="9"/>
      </g>

    </svg>
  </div>
</div>

<script>addEventListener("message",function(e){var s=document.querySelector(".scene");if(s)s.classList.toggle("play",e.data!=="calm");});</script>
</body>
</html>
