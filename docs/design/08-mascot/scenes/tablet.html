<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Amigo · 01 Выбор объектов — планшет</title>
<style>
:root{--ink:#1b1813;--helmet:#f7b500;--helmet-d:#d49400;--green:#1f9d57;--green-d:#14723d;--surface:#fffdf8;--paper:#f3efe6;--amber:#d98324}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.scene{position:relative;width:380px;height:420px;background:var(--surface);border:1px solid #ddd6c8;border-radius:18px;display:flex;align-items:center;justify-content:center}
.scene svg{width:340px;height:auto;display:block;overflow:visible}

.ln{fill:none;stroke:var(--ink);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.ln-thin{fill:none;stroke:var(--ink);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}
.fill-ink{fill:var(--ink);stroke:none}
.mustache{fill:var(--ink);stroke:none}
  .mcurl{fill:none;stroke:var(--ink);stroke-width:10;stroke-linecap:round;stroke-linejoin:round}
  .hl{fill:var(--surface)}
.helmet{fill:var(--helmet);stroke:var(--ink);stroke-width:5;stroke-linejoin:round}
.helmet-sh{fill:var(--helmet-d);stroke:none}
.paper-fill{fill:var(--surface)}

/* ── prop: realistic tablet ── */
.skin{fill:var(--paper);stroke:var(--ink);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.tablet-shell{fill:var(--surface);stroke:var(--ink);stroke-width:5;stroke-linejoin:round}
.tablet-screen{fill:var(--paper);stroke:var(--ink);stroke-width:3}
.tablet-cam{fill:var(--surface);stroke:var(--ink);stroke-width:2.2}
.tablet-home{fill:none;stroke:var(--ink);stroke-width:3;stroke-linecap:round;opacity:.5}
.row-icon{fill:var(--surface);stroke:var(--ink);stroke-width:2.8;stroke-linejoin:round}
.row-line{fill:none;stroke:var(--ink);stroke-width:3.2;stroke-linecap:round;opacity:.5}
.row-line-2{fill:none;stroke:var(--ink);stroke-width:3;stroke-linecap:round;opacity:.32}
.row-hi{fill:none;stroke:var(--green);stroke-width:3.6}
.row-hi-fill{fill:var(--green);opacity:.12}
.tap-ring{fill:none;stroke:var(--green);stroke-width:4}

/* ── ALL animation gated under .play (calm/static otherwise) ── */
.play .tap-arm{animation:tap-poke 3.4s ease-in-out infinite;transform-box:view-box;transform-origin:240px 200px}
.play .tap-ring{animation:tap-ring 3.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.play .row-hi,.play .row-hi-fill{animation:row-flash 3.4s ease-in-out infinite}
.play .rig{animation:breathe 3.4s ease-in-out infinite;transform-box:view-box;transform-origin:150px 220px}

@keyframes tap-poke{0%,28%,100%{transform:translate(0,0)}44%,56%{transform:translate(5px,-5px)}}
@keyframes tap-ring{0%,40%,100%{opacity:0;transform:scale(.35)}50%{opacity:.9;transform:scale(1)}72%{opacity:0;transform:scale(1.5)}}
@keyframes row-flash{0%,38%,100%{opacity:0}52%{opacity:1}82%{opacity:0}}
@keyframes breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(1.5px)}}

@media (prefers-reduced-motion: reduce){ .play *{animation:none!important} .play .row-hi,.play .row-hi-fill{opacity:1} }
</style>
</head>
