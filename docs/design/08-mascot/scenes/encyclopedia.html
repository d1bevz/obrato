<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amigo · 05 Факты и нормы</title>
<style>
:root{--ink:#1b1813;--helmet:#f7b500;--helmet-d:#d49400;--green:#1f9d57;--green-d:#14723d;--surface:#fffdf8;--paper:#f3efe6;--amber:#d98324}
body{margin:0;background:var(--paper);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.wrap{display:flex;flex-direction:column;align-items:center;gap:0}
.title{font-size:13px;letter-spacing:.04em;color:#8a8170;margin-bottom:10px;text-transform:uppercase;font-weight:600}
.scene{width:380px;height:420px;background:var(--surface);border:1px solid #ddd6c8;border-radius:18px;display:flex;align-items:center;justify-content:center}
.scene svg{width:300px;height:auto;display:block;overflow:visible}
.ln{fill:none;stroke:var(--ink);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.ln-thin{fill:none;stroke:var(--ink);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}
.fill-ink{fill:var(--ink);stroke:none}
.mustache{fill:var(--ink);stroke:none}
.helmet{fill:var(--helmet);stroke:var(--ink);stroke-width:5;stroke-linejoin:round}
.helmet-sh{fill:var(--helmet-d);stroke:none}
.paper-fill{fill:var(--surface)}

/* prop: book — text-lines, pages, cover */
.txt{fill:none;stroke:var(--ink);stroke-width:2.4;stroke-linecap:round;opacity:.5}
.cover{fill:var(--surface);stroke:var(--ink);stroke-width:4.4;stroke-linejoin:round}
.cover-edge{fill:var(--paper);stroke:var(--ink);stroke-width:4.4;stroke-linejoin:round}
.page{fill:var(--surface);stroke:var(--ink);stroke-width:3.6;stroke-linejoin:round}
.page-block{fill:var(--paper);stroke:var(--ink);stroke-width:3.4;stroke-linejoin:round}
.page-line{fill:none;stroke:var(--ink);stroke-width:1.6;stroke-linecap:round;opacity:.35}
.spine{fill:none;stroke:var(--ink);stroke-width:3.4;stroke-linecap:round}
.table{fill:none;stroke:var(--ink);stroke-width:1.9;stroke-linejoin:round;opacity:.62}
.table-accent{fill:none;stroke:var(--green);stroke-width:2.2;stroke-linecap:round}
.approx{fill:none;stroke:var(--green-d);stroke-width:4.2;stroke-linecap:round;stroke-linejoin:round}
.approx-ring{fill:none;stroke:var(--green);stroke-width:3.2;opacity:0}

/* ===== ALL animation gated under .play (calm static mode without it) ===== */
.play .approx-grp{animation:approxPulse 2.2s ease-in-out infinite;transform-origin:208px 182px}
.play .approx-ring{animation:approxRing 2.2s ease-in-out infinite;transform-origin:208px 182px}
.play .finger{animation:fingerSlide 3.4s ease-in-out infinite;transform-origin:center}
.play .page-flip{animation:pageFlip 3.4s ease-in-out infinite;transform-origin:115px 232px}
.play .browL{animation:browLift 3.4s ease-in-out infinite;transform-origin:92px 117px}
.play .eyeL,.play .eyeR{animation:gazeDown 3.4s ease-in-out infinite}

@keyframes approxPulse{
  0%,100%{transform:scale(1);opacity:.85}
  50%{transform:scale(1.18);opacity:1}
}
@keyframes approxRing{
  0%,100%{transform:scale(.85);opacity:0}
  45%{opacity:.5}
  100%{transform:scale(1.5);opacity:0}
}
@keyframes fingerSlide{
  0%,8%{transform:translate(0,0)}
  40%{transform:translate(34px,0)}
  50%{transform:translate(34px,4px)}
  82%,100%{transform:translate(0,0)}
}
@keyframes pageFlip{
  0%,60%{transform:scaleX(1);opacity:.95}
  72%{transform:scaleX(.1);opacity:.7}
  84%{transform:scaleX(1);opacity:.95}
  100%{transform:scaleX(1);opacity:.95}
}
@keyframes browLift{
  0%,30%{transform:translateY(0)}
  50%,70%{transform:translateY(-3px)}
  100%{transform:translateY(0)}
}
@keyframes gazeDown{
  0%,100%{transform:translateY(2px)}
  50%{transform:translateY(2.5px)}
}

@media (prefers-reduced-motion: reduce){ .play *{animation:none!important} }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">05 · Факты и нормы — справочник</div>
  <div class="scene play">
    <svg viewBox="-8 34 262 252" role="img" aria-label="Amigo сверяется по справочнику норм">

      <!-- ===================== BUST (verbatim) ===================== -->
      <g class="amigo">
        <!-- shoulders -->
        <path class="ln paper-fill" d="M56 260 q0 -54 59 -54 q59 0 59 54"/>
        <path class="ln-thin" d="M95 214 q20 14 40 0"/>
        <path class="ln-thin" d="M115 222 q0 19 0 38"/>
        <!-- head -->
        <g class="head">
          <path class="ln paper-fill" d="M71 134 q-9 1 -8 12 q1 9 9 7"/>
          <path class="ln paper-fill" d="M159 134 q9 1 8 12 q-1 9 -9 7"/>
          <path class="ln paper-fill" d="M71 120 q-3 26 4 38 q11 18 40 18 q29 0 40 -18 q7 -12 4 -38 q-44 -10 -88 0 Z"/>
          <path class="helmet" d="M60 106 q1 -54 55 -54 q54 0 55 54 q-27 -10 -55 -10 q-28 0 -55 10 Z"/>
          <path class="helmet-sh" d="M60 106 q27 -10 55 -10 q28 0 55 10 q-3 7 -11 6 q-44 -9 -88 0 q-8 1 -11 -6 Z"/>
          <path class="ln" d="M115 53 q0 26 0 43" opacity=".5"/>
          <path class="ln" d="M50 106 q65 -19 130 0"/>
          <path class="ln-thin browL" d="M83 117 q9 -5 18 -1"/>
          <path class="ln-thin browR" d="M129 116 q9 -4 18 1"/>
          <ellipse class="eyeL fill-ink" cx="92" cy="130" rx="4.4" ry="5.4"/>
          <ellipse class="eyeR fill-ink" cx="138" cy="130" rx="4.4" ry="5.4"/>
          <path class="ln-thin" d="M115 134 q3 9 0 16 q-3 3 -7 2"/>
          <g class="stache">
            <path class="mustache stacheL" d="M115 154 C 110 159, 102 161, 96 160 C 90 159, 86 156, 86 151 C 86 147, 89 145, 91 148 C 90 152, 94 155, 100 154 C 106 153, 111 151, 115 149 Z"/>
            <path class="mustache stacheR" d="M115 154 C 120 159, 128 161, 134 160 C 140 159, 144 156, 144 151 C 144 147, 141 145, 139 148 C 140 152, 136 155, 130 154 C 124 153, 119 151, 115 149 Z"/>
          </g>
          <path class="ln-thin mouth" d="M105 175 q10 4 20 0"/>
        </g>
      </g>
      <!-- ===================== /BUST ===================== -->

      <!-- ===================== PROP: thick open reference tome, held in both hands ===================== -->
      <!-- Forearms from the shoulders coming forward to the wrists at the book's lower corners -->
      <path class="ln paper-fill" d="M74 232 q-30 6 -38 30 q-3 9 4 16"/>
      <path class="ln paper-fill" d="M156 232 q30 6 38 30 q3 9 -4 16"/>

      <!-- ===== BOOK ===== centered on spine x=115; open like a butterfly ===== -->
      <g class="book">

        <!-- COVER: slightly overhangs the page-block on outer edges + bottom -->
        <path class="cover" d="M115 222
          q-30 -16 -62 -7
          q-6 1 -6 8
          l0 38
          q0 6 6 8
          q33 -10 62 5
          q29 -15 62 -5
          q6 -2 6 -8
          l0 -38
          q0 -7 -6 -8
          q-32 -9 -62 7 Z"/>

        <!-- LEFT page-block thickness (stacked pages, side volume) -->
        <path class="page-block" d="M114 270
          q-29 -15 -60 -5
          q-4 1 -4 5
          q31 -10 60 4
          q2 -5 4 -9 Z"/>
        <!-- RIGHT page-block thickness -->
        <path class="page-block" d="M116 270
          q29 -15 60 -5
          q4 1 4 5
          q-31 -10 -60 4
          q-2 -5 -4 -9 Z"/>
        <!-- thin striations on the side page-blocks (visible sheet stack) -->
        <path class="page-line" d="M55 262 q30 -9 59 3"/>
        <path class="page-line" d="M55 266 q30 -9 59 3"/>
        <path class="page-line" d="M175 262 q-30 -9 -59 3"/>
        <path class="page-line" d="M175 266 q-30 -9 -59 3"/>

        <!-- LEFT open page (curved sheet, sits above its block) -->
        <path class="page" d="M115 232
          q-28 -16 -58 -6
          q-3 1 -3 5
          l0 28
          q0 4 3 5
          q30 -10 58 4 Z"/>
        <!-- RIGHT open page -->
        <path class="page" d="M115 232
          q28 -16 58 -6
          q3 1 3 5
          l0 28
          q0 4 -3 5
          q-30 -10 -58 4 Z"/>

        <!-- LEFT page text lines (follow the page curve) -->
        <line class="txt" x1="64" y1="240" x2="105" y2="231"/>
        <line class="txt" x1="64" y1="247" x2="105" y2="238"/>
        <line class="txt" x1="64" y1="254" x2="98"  y2="247"/>
        <line class="txt" x1="64" y1="261" x2="105" y2="251"/>

        <!-- RIGHT page: small schematic TABLE/GRID, sits on the OUTER half (clear of spine + flip) -->
        <g class="table">
          <!-- table frame -->
          <path d="M137 234 l28 5 l0 16 l-28 -5 Z"/>
          <!-- vertical divider -->
          <path d="M151 236.5 l0 16"/>
          <!-- horizontal rows -->
          <path d="M138 239.5 l27 5"/>
          <path d="M137.5 245 l28 5"/>
        </g>
        <!-- green accent: one highlighted row-bar in the table -->
        <line class="table-accent" x1="139" y1="247.5" x2="149.5" y2="249.4" stroke-width="3.4"/>
        <!-- a few text lines below the table -->
        <line class="txt" x1="129" y1="259" x2="163" y2="265"/>
        <line class="txt" x1="129" y1="264" x2="155" y2="269"/>

        <!-- CENTER SPINE: clear groove down the middle of the open tome -->
        <path class="spine" d="M115 228 q0 22 0 44"/>
        <path class="page-line" d="M111 230 q-2 21 0 42"/>
        <path class="page-line" d="M119 230 q2 21 0 42"/>

        <!-- flipping page (a single right leaf lifting from the spine, inner half only) -->
        <g class="page-flip">
          <path class="page" d="M115 232 q19 -11 34 -4 q2 1 2 4 l0 26 q0 3 -2 3 q-17 -7 -34 4 Z" stroke-width="2.8"/>
          <line class="txt" x1="123" y1="237" x2="146" y2="242"/>
          <line class="txt" x1="123" y1="244" x2="146" y2="249"/>
          <line class="txt" x1="123" y1="251" x2="141" y2="255"/>
        </g>

        <!-- ===== HANDS cupping the lower corners of the open tome (tablet-scene convention) ===== -->
        <!-- LEFT hand: palm cups the lower-left cover corner, thumb on the front face, fingertips over the edge -->
        <g class="hand-l">
          <!-- palm cupping the corner (open arc, not a closed loop) -->
          <path class="ln paper-fill" d="M58 260 q-16 -1 -22 11 q-6 12 8 17"/>
          <!-- thumb resting on the front of the cover -->
          <path class="ln paper-fill" d="M58 260 q-9 5 -8 14"/>
          <!-- 3 fingertips peeking over the bottom edge -->
          <path class="ln-thin" d="M46 274 q-1 9 -9 10"/>
          <path class="ln-thin" d="M53 273 q-1 9 -9 11"/>
          <path class="ln-thin" d="M60 272 q-1 9 -8 11"/>
        </g>

        <!-- RIGHT hand: palm cups the lower-right cover corner, thumb on front, fingertips over the edge -->
        <g class="hand-r">
          <path class="ln paper-fill" d="M172 260 q16 -1 22 11 q6 12 -8 17"/>
          <path class="ln paper-fill" d="M172 260 q9 5 8 14"/>
          <path class="ln-thin" d="M184 274 q1 9 9 10"/>
          <path class="ln-thin" d="M177 273 q1 9 9 11"/>
          <path class="ln-thin" d="M170 272 q1 9 8 11"/>
        </g>

        <!-- tracing finger (free index) reaching up ONTO the left page, resting on a text line -->
        <g class="finger">
          <!-- slim index finger rising from lower-left, fingertip on the page at ~(74,248) -->
          <path class="ln paper-fill" d="M64 278 q2 -16 9 -24 q4 -4 7 -1 q3 3 -1 7 q-5 6 -6 18 Z"/>
          <!-- fingernail tip touching the line -->
          <path class="ln-thin" d="M73 251 q4 -3 7 -1" stroke-width="2.6" opacity=".6"/>
        </g>
      </g>

      <!-- ===================== «≈» approximate sign — floats upper-right, clear of head ===================== -->
      <g transform="translate(208,182)">
        <circle class="approx-ring" cx="0" cy="0" r="22"/>
        <g class="approx-grp">
          <path class="approx" d="M-12 -5 q6 -7 12 0 q6 7 12 0"/>
          <path class="approx" d="M-12 6 q6 -7 12 0 q6 7 12 0"/>
        </g>
      </g>
      <!-- thought dots leading from book up to the «≈» sign -->
      <circle class="fill-ink" cx="180" cy="232" r="2"   opacity=".3"/>
      <circle class="fill-ink" cx="190" cy="218" r="2.4" opacity=".38"/>
      <circle class="fill-ink" cx="198" cy="202" r="2.8" opacity=".45"/>

    </svg>
  </div>
</div>

<script>addEventListener("message",function(e){var s=document.querySelector(".scene");if(s)s.classList.toggle("play",e.data!=="calm");});</script>
</body>
</html>
