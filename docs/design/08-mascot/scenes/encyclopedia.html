<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amigo · 05 Факты и нормы — справочник</title>
<style>
:root{--ink:#1b1813;--helmet:#f7b500;--helmet-d:#d49400;--green:#1f9d57;--green-d:#14723d;--surface:#fffdf8;--paper:#f3efe6;--amber:#d98324}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.title{color:#6b6456;font-size:13px;letter-spacing:.04em;margin-bottom:10px;text-transform:uppercase;font-weight:600}
.scene{position:relative;width:380px;height:420px;background:var(--surface);border:1px solid #ddd6c8;border-radius:18px;display:flex;align-items:center;justify-content:center}
.scene svg{width:330px;height:auto;display:block;overflow:visible}
.ln{fill:none;stroke:var(--ink);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.ln-thin{fill:none;stroke:var(--ink);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}
.fill-ink{fill:var(--ink);stroke:none}
.mustache{fill:var(--ink);stroke:none}
  .mcurl{fill:none;stroke:var(--ink);stroke-width:10;stroke-linecap:round;stroke-linejoin:round}
  .hl{fill:var(--surface)}
.helmet{fill:var(--helmet);stroke:var(--ink);stroke-width:5;stroke-linejoin:round}
.helmet-sh{fill:var(--helmet-d);stroke:none}
.paper-fill{fill:var(--surface)}

/* ===== prop: thick open reference tome ===== */
.cover{fill:var(--paper);stroke:var(--ink);stroke-width:4.6;stroke-linejoin:round}
.spine-block{fill:var(--paper);stroke:var(--ink);stroke-width:4.2;stroke-linejoin:round}
.page-block{fill:var(--surface);stroke:var(--ink);stroke-width:3.8;stroke-linejoin:round}
.page-striation{fill:none;stroke:var(--ink);stroke-width:1.5;stroke-linecap:round;opacity:.32}
.page{fill:var(--surface);stroke:var(--ink);stroke-width:3.8;stroke-linejoin:round}
.spine{fill:none;stroke:var(--ink);stroke-width:3.4;stroke-linecap:round}
.spine-soft{fill:none;stroke:var(--ink);stroke-width:1.6;stroke-linecap:round;opacity:.34}
.txt{fill:none;stroke:var(--ink);stroke-width:2.4;stroke-linecap:round;opacity:.5}
.table-frame{fill:none;stroke:var(--ink);stroke-width:1.9;stroke-linejoin:round;opacity:.62}
.table-accent{fill:none;stroke:var(--green);stroke-width:3.4;stroke-linecap:round}

/* ===== hands (solid mitten masses that truly grip the book) ===== */
.hand-fill{fill:var(--surface);stroke:var(--ink);stroke-width:3.6;stroke-linecap:round;stroke-linejoin:round}
.knuck{fill:none;stroke:var(--ink);stroke-width:2.1;stroke-linecap:round;opacity:.66}

/* ===== «≈» approximate sign ===== */
.approx{fill:none;stroke:var(--green-d);stroke-width:4.4;stroke-linecap:round;stroke-linejoin:round}
.approx-ring{fill:none;stroke:var(--green);stroke-width:3.2;opacity:0}

/* ===== STATIC (calm) defaults — everything readable with NO motion ===== */

/* ===== ANIMATION — ONLY under .play (remove .play => static calm) ===== */
.play .book-rig{animation:bookBreathe 3.6s ease-in-out infinite;transform-box:view-box;transform-origin:115px 250px}
.play .trace{animation:traceSlide 4s ease-in-out infinite;transform-box:view-box;transform-origin:160px 250px}
.play .approx-grp{animation:approxPulse 2.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.play .approx-ring{animation:approxRing 2.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.play .browL{animation:browLift 4s ease-in-out infinite;transform-box:view-box;transform-origin:92px 117px}
.play .eyeL,.play .eyeR{animation:gazeBlink 4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}

@keyframes bookBreathe{
  0%,100%{transform:translateY(0) rotate(0deg)}
  50%{transform:translateY(1.4px) rotate(-.3deg)}
}
@keyframes traceSlide{
  0%,10%{transform:translate(0,0)}
  46%{transform:translate(20px,2.2px)}
  56%{transform:translate(20px,3.4px)}
  90%,100%{transform:translate(0,0)}
}
@keyframes approxPulse{
  0%,100%{transform:scale(1);opacity:.9}
  50%{transform:scale(1.16);opacity:1}
}
@keyframes approxRing{
  0%,100%{transform:scale(.8);opacity:0}
  45%{opacity:.5}
  100%{transform:scale(1.42);opacity:0}
}
@keyframes browLift{
  0%,28%{transform:translateY(0)}
  50%,70%{transform:translateY(-3px)}
  100%{transform:translateY(0)}
}
@keyframes gazeBlink{
  0%,90%,100%{transform:translateY(2px) scaleY(1)}
  50%{transform:translateY(2.6px) scaleY(1)}
  94.5%{transform:translateY(2.4px) scaleY(.1)}
}

@media (prefers-reduced-motion: reduce){ .play *{animation:none!important} }
</style>

        q1 -7 0 -14 Z"/>
      <!-- right fore-edge block -->
      <path class="page-block" d="M116 266
        q29 -14 58 -5
        q4 1 4 6
        l0 4
        q0 4 -4 5
        q-29 -9 -58 4
        q-1 -7 0 -14 Z"/>
      <!-- thin striations = individual sheets in the stacks -->
      <path class="page-striation" d="M55 262 q29 -9 58 3"/>
      <path class="page-striation" d="M55 266 q29 -9 58 3"/>
      <path class="page-striation" d="M55 270 q29 -9 58 3"/>
      <path class="page-striation" d="M175 262 q-29 -9 -58 3"/>
      <path class="page-striation" d="M175 266 q-29 -9 -58 3"/>
      <path class="page-striation" d="M175 270 q-29 -9 -58 3"/>

      <!-- ===== OPEN PAGES — two leaves curving up from the central spine ===== -->
      <!-- left page -->
      <path class="page" d="M115 234
        q-27 -15 -55 -6
        q-3 1 -3 5
        l0 24
        q0 4 3 5
        q28 -9 55 4 Z"/>
      <!-- right page -->
      <path class="page" d="M115 234
        q27 -15 55 -6
        q3 1 3 5
        l0 24
        q0 4 -3 5
        q-28 -9 -55 4 Z"/>

      <!-- LEFT page: body text lines following the page curve -->
      <line class="txt" x1="66" y1="241" x2="104" y2="233"/>
      <line class="txt" x1="66" y1="247" x2="104" y2="240"/>
      <line class="txt" x1="66" y1="253" x2="99"  y2="247"/>
      <line class="txt" x1="66" y1="259" x2="104" y2="253"/>
      <line class="txt" x1="66" y1="265" x2="97"  y2="260"/>

      <!-- RIGHT page: small schematic norm-TABLE on the outer half + a couple of lines -->
      <g class="table-frame">
        <path d="M132 240 l30 5 l0 17 l-30 -5 Z"/>
        <path d="M147 242.5 l0 17"/>
        <path d="M133 245.5 l29 5"/>
        <path d="M132.5 251 l30 5"/>
      </g>
      <!-- ONE modest green accent: a highlighted norm row in the table -->
      <line class="table-accent" x1="134" y1="253.4" x2="145.5" y2="255.4"/>
      <line class="txt" x1="166" y1="246" x2="170" y2="247"/>
      <line class="txt" x1="125" y1="266" x2="160" y2="272"/>
      <line class="txt" x1="125" y1="271" x2="152" y2="276"/>

      <!-- ===== CENTRE SPINE GROOVE ===== -->
      <path class="spine" d="M115 230 q0 21 0 42"/>
      <path class="spine-soft" d="M111 232 q-2 20 0 40"/>
      <path class="spine-soft" d="M119 232 q2 20 0 40"/>

      <!-- =================================================================
           HANDS — solid mitten masses that genuinely GRIP the lower corners.
           Each palm cups UNDER the cover corner (book edge tucks behind it),
           the THUMB pad presses on the FRONT of the cover, and knuckle creases
           sell the curl. Drawn AFTER the book so they overlap it = "held".
           ================================================================= -->

      <!-- LEFT HAND — Amigo's right; grips the lower-LEFT cover corner.
           Heel/palm tucks BEHIND the corner (cover edge passes in front of it);
           the THUMB lies up the FRONT face of the cover; four FINGERS curl OVER
           the bottom edge onto the front. Proven tablet-grip read. -->
      <g class="hand-l">
        <!-- (a) palm heel — rounded mass cupping under the lower-left corner -->
        <path class="hand-fill" d="M55 252
          q-17 -1 -22 14
          q-4 14 9 21
          q12 6 22 -3
          q7 -7 4 -17
          q-3 -10 -13 -15 Z"/>
        <!-- (b) THUMB laid up the FRONT of the cover along the left margin -->
        <path class="hand-fill" d="M64 244 q-10 3 -13 13 q-2 8 3 15"/>
        <!-- (c) four FINGERS curling over the bottom edge onto the front (overlap = grip) -->
        <path class="ln-thin" d="M58 258 q-9 3 -8 13"/>
        <path class="ln-thin" d="M52 261 q-9 3 -8 13"/>
        <path class="ln-thin" d="M46 265 q-8 3 -8 12"/>
        <path class="ln-thin" d="M41 270 q-7 3 -7 11"/>
      </g>

      <!-- RIGHT HAND — Amigo's left; grips the lower-RIGHT cover corner -->
      <g class="hand-r">
        <path class="hand-fill" d="M175 252
          q17 -1 22 14
          q4 14 -9 21
          q-12 6 -22 -3
          q-7 -7 -4 -17
          q3 -10 13 -15 Z"/>
        <path class="hand-fill" d="M166 244 q10 3 13 13 q2 8 -3 15"/>
        <path class="ln-thin" d="M172 258 q9 3 8 13"/>
        <path class="ln-thin" d="M178 261 q9 3 8 13"/>
        <path class="ln-thin" d="M184 265 q8 3 8 12"/>
        <path class="ln-thin" d="M189 270 q7 3 7 11"/>

        <!-- (e) RIGHT INDEX FINGER extends from this hand to TRACE a line on the page.
             It rises from the thumb-web and lays its pad on a left-page text line. -->
        <g class="trace">
          <!-- the extended index: tapered finger from the hand up onto the page -->
          <path class="hand-fill" d="M167 247
            q-9 -6 -17 -16
            q-3 -4 0 -7
            q3 -3 7 0
            q6 7 16 13
            q4 3 2 8
            q-2 4 -8 2 Z" stroke-width="3.4"/>
          <!-- fingertip pad resting on the text line it is following -->
          <path class="knuck" d="M150 230 q3 -3 7 -1" stroke-width="2.4"/>
        </g>
      </g>

    </g><!-- /book-rig -->

    <!-- ===================== «≈» approximate sign — floats upper-right, clear of head ===================== -->
    <!-- thought-dots ladder leading from the book up to the sign -->
    <circle class="fill-ink" cx="184" cy="222" r="2"   opacity=".28"/>
    <circle class="fill-ink" cx="196" cy="206" r="2.4" opacity=".36"/>
    <circle class="fill-ink" cx="206" cy="188" r="2.8" opacity=".44"/>

    <g transform="translate(212,168)">
      <circle class="approx-ring" cx="0" cy="0" r="22"/>
      <g class="approx-grp">
        <path class="approx" d="M-13 -5 q6.5 -8 13 0 q6.5 8 13 0"/>
        <path class="approx" d="M-13 6 q6.5 -8 13 0 q6.5 8 13 0"/>
      </g>
    </g>

  </svg>
</div>
