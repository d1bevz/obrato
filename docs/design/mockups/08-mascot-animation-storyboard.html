<!doctype html>

<head>
  <meta charset="utf-8">

  <title>Obrato · персонаж и эмоции v2</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f6f4;
      --paper: #fffef9;
      --ink: #17231f;
      --muted: #61716a;
      --line: #d7ded8;
      --teal: #118277;
      --teal-soft: #dff2ee;
      --yellow: #f2c64f;
      --yellow-soft: #fff0b2;
      --orange: #d47235;
      --orange-soft: #f7dfcf;
      --blue: #577f91;
      --blue-soft: #dfedf2;
      --gray-soft: #ecefeb;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(17, 130, 119, 0.05), transparent 420px),
        var(--bg);
      color: var(--ink);
    }

    .wrap {
      width: min(100%, 1840px);
      margin: 0 auto;
      padding: 18px;
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
      box-shadow: 0 18px 48px rgba(23, 35, 31, 0.10);
      background: var(--bg);
    }

    .title {
      font-size: 43px;
      font-weight: 850;
      fill: var(--ink);
    }

    .subtitle {
      font-size: 21px;
      font-weight: 520;
      fill: var(--muted);
    }

    .card-title {
      font-size: 26px;
      font-weight: 840;
      fill: var(--ink);
    }

    .card-text {
      font-size: 17px;
      font-weight: 540;
      fill: var(--muted);
    }

    .small {
      font-size: 15px;
      font-weight: 700;
      fill: var(--muted);
    }

    .chip-text {
      font-size: 13px;
      font-weight: 800;
      fill: #4d5e57;
    }

    .num-text {
      font-size: 18px;
      font-weight: 900;
      fill: #07534f;
    }

    .role-text {
      font-size: 15px;
      font-weight: 850;
      fill: #5d4812;
    }

    .stroke {
      fill: none;
      stroke: var(--ink);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .thin {
      stroke-width: 3.5;
    }

    .skin {
      fill: #f1c899;
      stroke: #966b21;
      stroke-width: 5;
    }

    .skin-line {
      fill: none;
      stroke: #f1c899;
      stroke-width: 17;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .skin-line-outline {
      fill: none;
      stroke: #966b21;
      stroke-width: 22;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .helmet {
      fill: var(--yellow);
      stroke: #966b21;
      stroke-width: 5;
      stroke-linejoin: round;
    }

    .shirt {
      fill: var(--teal);
      stroke: #07534f;
      stroke-width: 5;
      stroke-linejoin: round;
    }

    .vest {
      fill: none;
      stroke: #f5b45c;
      stroke-width: 6;
      stroke-linecap: round;
    }

    .mustache {
      fill: none;
      stroke: #17231f;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .smile {
      fill: none;
      stroke: #17231f;
      stroke-width: 4;
      stroke-linecap: round;
    }

    .tool-dark {
      fill: #24302b;
      stroke: #17231f;
      stroke-width: 5;
      stroke-linejoin: round;
    }

    .tool-light {
      fill: #fffef9;
      stroke: #17231f;
      stroke-width: 5;
      stroke-linejoin: round;
    }

    .signal {
      fill: none;
      stroke: #61716a;
      stroke-width: 5;
      stroke-linecap: round;
    }
  </style>
</head>
